name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Type Check
        run: npx tsc --noEmit

  unit-test:
    name: Unit Tests + Coverage
    runs-on: ubuntu-latest
    # Phase 1.5 で 26 失敗テスト全修復 → 必須ゲートに復帰
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Run Tests with Coverage
        run: npm run test:coverage:ci
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://fake.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: fake-anon-key
      - name: Coverage Summary
        run: |
          echo "## Test Coverage" >> $GITHUB_STEP_SUMMARY
          cat coverage/lcov-report/index.html 2>/dev/null | grep -E "strong|fraction" | head -20 || true
      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30
      - name: Coverage Gate（Lines 80%未満 / Branches 100%未満で失敗）
        run: |
          read LINES BRANCHES <<< "$(cat coverage/coverage-summary.json 2>/dev/null | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          total = d.get('total', {})
          lines = total.get('lines', {}).get('pct', 0)
          branches = total.get('branches', {}).get('pct', 0)
          print(lines, branches)
          " 2>/dev/null || echo "0 0")"
          echo "Line coverage: ${LINES}%"
          echo "Branch coverage: ${BRANCHES}%"
          if (( $(echo "$LINES < 80" | bc -l) )); then
            echo "❌ Lineカバレッジが 80% を下回っています: ${LINES}%"
            exit 1
          fi
          # L3: ブランチカバレッジは測定スコープ内で100%を維持（発症前予防の物理ゲート）
          if (( $(echo "$BRANCHES < 100" | bc -l) )); then
            echo "❌ Branchカバレッジが 100% を下回っています: ${BRANCHES}%（L3 退行）"
            exit 1
          fi
          echo "✅ カバレッジ OK: Lines ${LINES}% / Branches ${BRANCHES}%"

  e2e-test:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [lint-typecheck, unit-test]
    # PR でも e2e を必須化する（push-main 限定だと e2e 退行のまま PR マージ可能になる盲点）。
    # workflow は push-main と PR-to-main でのみ起動するため、if を外せば両方で走る。
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          # 既知良好版にピン留め（再現性100%・発症前予防）。
          # `latest` は将来のCLI更新で挙動が変わりうる変動要因。実際 CLI 2.75.0 の
          # マイグレーション文分割器には「引数リスト付き CREATE FUNCTION の直後に別文が
          # 続くファイル」を1チャンク化して 42601(cannot insert multiple commands into a
          # prepared statement) を起こすバグがあり、2.104.0 で修正されていることを
          # ローカル fresh-apply 実測で確認済み。下の `supabase start` ゲートが将来の
          # ピン更新時の退行も検知する二重防御。
          version: 2.104.0
      - name: Start Supabase (fresh-apply gate)
        # 恒久・発症前予防の中核ゲート。`supabase start` は supabase/migrations/*.sql を
        # 「新規環境へ全 replay（fresh-apply）」する。version 衝突・42P16（View 列改名）・
        # 関数重複（function name is not unique）等で 1 本でも適用失敗すれば、ここで CI が
        # 落ち、e2e 以前に「migration が新規環境で再生不能」というドリフトを検知する。
        # これが従来 fake.supabase.co で握り潰されていた E2E 連鎖失敗の真因（/api/health 503）
        # を根治する: 実 Supabase をローカル起動し本物の DB/anon key を後段へ渡す。
        run: supabase start
      - name: Export Supabase local credentials
        id: supabase
        # `supabase status -o env` は ANON_KEY= / API_URL= 形式で出力（値はクォートなし）。
        # 厳密な行頭アンカーで該当キーだけ抽出し、後段 step の env へ受け渡す。
        run: |
          STATUS=$(supabase status -o env)
          API_URL=$(echo "$STATUS" | grep '^API_URL=' | cut -d= -f2-)
          ANON_KEY=$(echo "$STATUS" | grep '^ANON_KEY=' | cut -d= -f2-)
          SERVICE_ROLE_KEY=$(echo "$STATUS" | grep '^SERVICE_ROLE_KEY=' | cut -d= -f2-)
          # service_role key は /api/health の rate_limit プローブ（createServiceRoleClient →
          # check_rate_limit RPC）が必須とする。欠けると criticalOk=false → 503 になり
          # api-contract.spec.ts の status===200 / 'healthy'|'degraded' 期待が連鎖失敗する。
          if [ -z "$API_URL" ] || [ -z "$ANON_KEY" ] || [ -z "$SERVICE_ROLE_KEY" ]; then
            echo "❌ supabase status から API_URL / ANON_KEY / SERVICE_ROLE_KEY を取得できませんでした"
            exit 1
          fi
          echo "url=$API_URL" >> "$GITHUB_OUTPUT"
          echo "::add-mask::$ANON_KEY"
          echo "anon=$ANON_KEY" >> "$GITHUB_OUTPUT"
          echo "::add-mask::$SERVICE_ROLE_KEY"
          echo "service_role=$SERVICE_ROLE_KEY" >> "$GITHUB_OUTPUT"
      - name: Install Playwright Browsers
        # playwright.config の 2 プロジェクト（chromium / Mobile Safari=webkit）を両方導入。
        # 従来は chromium のみで webkit 系の E2E が実行されない盲点があった。
        run: npx playwright install --with-deps chromium webkit
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ steps.supabase.outputs.url }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ steps.supabase.outputs.anon }}
          SKIP_ENV_VALIDATION: true
      - name: Run E2E Tests
        run: npm run test:e2e
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          NEXT_PUBLIC_SUPABASE_URL: ${{ steps.supabase.outputs.url }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ steps.supabase.outputs.anon }}
          # /api/health の rate_limit プローブ（service_role + check_rate_limit RPC）に必須。
          SUPABASE_SERVICE_ROLE_KEY: ${{ steps.supabase.outputs.service_role }}
      - name: Stop Supabase
        if: always()
        run: supabase stop || true
      - name: Upload E2E Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  security-scan:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: npm audit（high以上の脆弱性チェック）
        # L6 基準「high=0」を CI で物理ゲート化する。high 脆弱性で CI を落とす
        # （continue-on-error で握り潰すと high 混入のまま merge できる盲点になる）。
        run: npm audit --audit-level=high
      - name: Critical 脆弱性は失敗させる
        run: |
          CRITICAL=$(npm audit --json 2>/dev/null | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          print(d.get('metadata', {}).get('vulnerabilities', {}).get('critical', 0))
          " 2>/dev/null || echo "0")
          echo "Critical vulnerabilities: $CRITICAL"
          if [ "$CRITICAL" -gt 0 ]; then
            echo "❌ Critical 脆弱性が検出されました: ${CRITICAL} 件"
            exit 1
          fi
          echo "✅ Critical 脆弱性なし"
      - name: Secrets スキャン（ハードコードされた認証情報を検出）
        run: |
          # 一般的なシークレットパターンをチェック
          if grep -rE "(sk_live_|pk_live_|AKIA[0-9A-Z]{16}|eyJhbGciOiJIUzI1NiJ9)" \
            src/ --include="*.ts" --include="*.tsx" --exclude-dir=node_modules; then
            echo "❌ ハードコードされたシークレットを検出"
            exit 1
          fi
          echo "✅ シークレットスキャン OK"

  pr-comment:
    name: PR Coverage Comment
    runs-on: ubuntu-latest
    needs: [unit-test]
    if: github.event_name == 'pull_request'
    # PR へのカバレッジコメント投稿には issues/pull_requests への write が必須。
    # 未指定だと GITHUB_TOKEN は read-only で 403 "Resource not accessible by integration"。
    # job-level permissions は未指定スコープを none にするため checkout 用の contents:read も明示。
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: coverage/
        continue-on-error: true
      - name: Comment Coverage on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '## テストカバレッジ\n\n';
            try {
              const summary = JSON.parse(fs.readFileSync('coverage/coverage-summary.json', 'utf8'));
              const total = summary.total;
              body += `| 指標 | カバレッジ |\n|------|----------|\n`;
              body += `| Lines | ${total.lines.pct}% (${total.lines.covered}/${total.lines.total}) |\n`;
              body += `| Functions | ${total.functions.pct}% |\n`;
              body += `| Branches | ${total.branches.pct}% |\n`;
              body += `| Statements | ${total.statements.pct}% |\n`;
              const gate = total.lines.pct >= 80 ? '✅' : '❌';
              body += `\n${gate} ゲート基準: Lines 80% 以上`;
            } catch (e) {
              body += '⚠️ カバレッジデータが取得できませんでした';
            }
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

  contract-test:
    name: Contract Tests (staging drift gate)
    runs-on: ubuntu-latest
    # 本番と repo migration の「静かなドリフト」（RPC 不在 / カラム欠落 / View 未作成 /
    # RLS 過大公開 / 予約 RPC の 0A000 landmine）を発症前に検知する恒久ゲート。
    # staging 専用 secrets が未設定なら全テストが describe.skip され、本番には一切触れない。
    # secrets を設定した時点で自動的にドリフト検知ゲートとして有効化される。
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Staging secrets 存在チェック（無効時に false-green を防ぐ）
        env:
          STAGING_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          STAGING_SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$STAGING_SUPABASE_URL" ] || [ -z "$STAGING_SUPABASE_ANON_KEY" ]; then
            echo "⚠️ STAGING_SUPABASE_* 未設定: contract ドリフトゲートは **無効**（全テスト skip）。" >> $GITHUB_STEP_SUMMARY
            echo "有効化するには GitHub Secrets に STAGING_SUPABASE_URL / STAGING_SUPABASE_ANON_KEY（任意で STAGING_SUPABASE_SERVICE_ROLE_KEY）を設定してください。" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ STAGING_SUPABASE_* 設定済み: contract ドリフトゲート **有効**。" >> $GITHUB_STEP_SUMMARY
          fi
      - name: Run Contract Tests
        run: npm run test:contract
        env:
          # staging 専用シークレット（GitHub Secrets 経由・値は repo に書かない）。
          # 未設定時は各テストが describe.skip され安全に pass する。
          STAGING_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          STAGING_SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}
          STAGING_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.STAGING_SUPABASE_SERVICE_ROLE_KEY }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
