name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Type Check
        run: npx tsc --noEmit

  unit-test:
    name: Unit Tests + Coverage
    runs-on: ubuntu-latest
    # Phase 1.5 で 26 失敗テスト全修復 → 必須ゲートに復帰
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Run Tests with Coverage
        run: npm run test:coverage:ci
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://fake.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: fake-anon-key
      - name: Coverage Summary
        run: |
          echo "## Test Coverage" >> $GITHUB_STEP_SUMMARY
          cat coverage/lcov-report/index.html 2>/dev/null | grep -E "strong|fraction" | head -20 || true
      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30
      - name: Coverage Gate（80%未満で失敗）
        run: |
          LINES=$(cat coverage/coverage-summary.json 2>/dev/null | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          total = d.get('total', {})
          lines = total.get('lines', {}).get('pct', 0)
          print(lines)
          " 2>/dev/null || echo "0")
          echo "Line coverage: ${LINES}%"
          if (( $(echo "$LINES < 80" | bc -l) )); then
            echo "❌ カバレッジが 80% を下回っています: ${LINES}%"
            exit 1
          fi
          echo "✅ カバレッジ OK: ${LINES}%"

  e2e-test:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [lint-typecheck, unit-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://fake.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: fake-anon-key
          SKIP_ENV_VALIDATION: true
      - name: Run E2E Tests
        run: npm run test:e2e
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          NEXT_PUBLIC_SUPABASE_URL: https://fake.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: fake-anon-key
      - name: Upload E2E Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  security-scan:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: npm audit（high以上の脆弱性チェック）
        run: npm audit --audit-level=high
        continue-on-error: true
      - name: Critical 脆弱性は失敗させる
        run: |
          CRITICAL=$(npm audit --json 2>/dev/null | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          print(d.get('metadata', {}).get('vulnerabilities', {}).get('critical', 0))
          " 2>/dev/null || echo "0")
          echo "Critical vulnerabilities: $CRITICAL"
          if [ "$CRITICAL" -gt 0 ]; then
            echo "❌ Critical 脆弱性が検出されました: ${CRITICAL} 件"
            exit 1
          fi
          echo "✅ Critical 脆弱性なし"
      - name: Secrets スキャン（ハードコードされた認証情報を検出）
        run: |
          # 一般的なシークレットパターンをチェック
          if grep -rE "(sk_live_|pk_live_|AKIA[0-9A-Z]{16}|eyJhbGciOiJIUzI1NiJ9)" \
            src/ --include="*.ts" --include="*.tsx" --exclude-dir=node_modules; then
            echo "❌ ハードコードされたシークレットを検出"
            exit 1
          fi
          echo "✅ シークレットスキャン OK"

  pr-comment:
    name: PR Coverage Comment
    runs-on: ubuntu-latest
    needs: [unit-test]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: coverage/
        continue-on-error: true
      - name: Comment Coverage on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '## テストカバレッジ\n\n';
            try {
              const summary = JSON.parse(fs.readFileSync('coverage/coverage-summary.json', 'utf8'));
              const total = summary.total;
              body += `| 指標 | カバレッジ |\n|------|----------|\n`;
              body += `| Lines | ${total.lines.pct}% (${total.lines.covered}/${total.lines.total}) |\n`;
              body += `| Functions | ${total.functions.pct}% |\n`;
              body += `| Branches | ${total.branches.pct}% |\n`;
              body += `| Statements | ${total.statements.pct}% |\n`;
              const gate = total.lines.pct >= 80 ? '✅' : '❌';
              body += `\n${gate} ゲート基準: Lines 80% 以上`;
            } catch (e) {
              body += '⚠️ カバレッジデータが取得できませんでした';
            }
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

  contract-test:
    name: Contract Tests (staging drift gate)
    runs-on: ubuntu-latest
    # 本番と repo migration の「静かなドリフト」（RPC 不在 / カラム欠落 / View 未作成 /
    # RLS 過大公開 / 予約 RPC の 0A000 landmine）を発症前に検知する恒久ゲート。
    # staging 専用 secrets が未設定なら全テストが describe.skip され、本番には一切触れない。
    # secrets を設定した時点で自動的にドリフト検知ゲートとして有効化される。
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Staging secrets 存在チェック（無効時に false-green を防ぐ）
        env:
          STAGING_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          STAGING_SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$STAGING_SUPABASE_URL" ] || [ -z "$STAGING_SUPABASE_ANON_KEY" ]; then
            echo "⚠️ STAGING_SUPABASE_* 未設定: contract ドリフトゲートは **無効**（全テスト skip）。" >> $GITHUB_STEP_SUMMARY
            echo "有効化するには GitHub Secrets に STAGING_SUPABASE_URL / STAGING_SUPABASE_ANON_KEY（任意で STAGING_SUPABASE_SERVICE_ROLE_KEY）を設定してください。" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ STAGING_SUPABASE_* 設定済み: contract ドリフトゲート **有効**。" >> $GITHUB_STEP_SUMMARY
          fi
      - name: Run Contract Tests
        run: npm run test:contract
        env:
          # staging 専用シークレット（GitHub Secrets 経由・値は repo に書かない）。
          # 未設定時は各テストが describe.skip され安全に pass する。
          STAGING_SUPABASE_URL: ${{ secrets.STAGING_SUPABASE_URL }}
          STAGING_SUPABASE_ANON_KEY: ${{ secrets.STAGING_SUPABASE_ANON_KEY }}
          STAGING_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.STAGING_SUPABASE_SERVICE_ROLE_KEY }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
