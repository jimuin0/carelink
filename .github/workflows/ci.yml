name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Type Check
        run: npx tsc --noEmit

  unit-test:
    name: Unit Tests + Coverage
    runs-on: ubuntu-latest
    # Phase 1.5 で 26 失敗テスト全修復 → 必須ゲートに復帰
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Run Tests with Coverage
        run: npm run test:coverage:ci
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://fake.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: fake-anon-key
      - name: Coverage Summary
        run: |
          echo "## Test Coverage" >> $GITHUB_STEP_SUMMARY
          cat coverage/lcov-report/index.html 2>/dev/null | grep -E "strong|fraction" | head -20 || true
      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30
      - name: Coverage Gate（行95%・branch99%未満で失敗＝L3退行を発症前ブロック）
        # 旧ゲートは「Lines 80%未満で失敗」のみで、branch カバレッジが未ゲートだった。実測は
        # Lines 99.5%超 / Branch 99.8%超なのに 80% 床では、テスト皆無の新規コードが混入しても CI が通り
        # プロジェクトの L3 基準（branch 100%）が手動規律頼み＝必ず退行する穴になっていた。
        # 行＋ブランチ両方に現実値直下の床を設けて、全 PR で意味ある退行を自動的に止める（真の予防）。
        run: |
          python3 - <<'PY'
          import sys, json
          d = json.load(open('coverage/coverage-summary.json'))
          t = d.get('total', {})
          lines = t.get('lines', {}).get('pct', 0)
          branches = t.get('branches', {}).get('pct', 0)
          print(f"Line coverage: {lines}%  /  Branch coverage: {branches}%")
          fail = False
          if lines < 95:
              print(f"❌ 行カバレッジが 95% 未満です: {lines}%"); fail = True
          if branches < 99:
              print(f"❌ ブランチカバレッジが 99% 未満です: {branches}%"); fail = True
          if fail:
              sys.exit(1)
          print("✅ カバレッジ OK（行・ブランチ両方が床を満たす）")
          PY

  e2e-test:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [lint-typecheck, unit-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://fake.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: fake-anon-key
          SKIP_ENV_VALIDATION: true
      - name: Run E2E Tests
        run: npm run test:e2e
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          NEXT_PUBLIC_SUPABASE_URL: https://fake.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: fake-anon-key
      - name: Upload E2E Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  security-scan:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: npm audit（high以上の脆弱性チェック）
        run: npm audit --audit-level=high
        continue-on-error: true
      - name: Critical 脆弱性は失敗させる
        run: |
          CRITICAL=$(npm audit --json 2>/dev/null | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          print(d.get('metadata', {}).get('vulnerabilities', {}).get('critical', 0))
          " 2>/dev/null || echo "0")
          echo "Critical vulnerabilities: $CRITICAL"
          if [ "$CRITICAL" -gt 0 ]; then
            echo "❌ Critical 脆弱性が検出されました: ${CRITICAL} 件"
            exit 1
          fi
          echo "✅ Critical 脆弱性なし"
      - name: Secrets スキャン（ハードコードされた認証情報を検出）
        run: |
          # 一般的なシークレットパターンをチェック
          if grep -rE "(sk_live_|pk_live_|AKIA[0-9A-Z]{16}|eyJhbGciOiJIUzI1NiJ9)" \
            src/ --include="*.ts" --include="*.tsx" --exclude-dir=node_modules; then
            echo "❌ ハードコードされたシークレットを検出"
            exit 1
          fi
          echo "✅ シークレットスキャン OK"

  pr-comment:
    name: PR Coverage Comment
    runs-on: ubuntu-latest
    needs: [unit-test]
    if: github.event_name == 'pull_request'
    # PR にカバレッジコメントを投稿するため pull-requests: write を付与する。
    # これが無いと既定トークンは read-only で issues.createComment が 403
    # （Resource not accessible by integration）になり、テスト・カバレッジは合格なのに
    # 当ジョブだけ毎PR で fail し PR が UNSTABLE になる（症状）。権限付与が根本解決。
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: coverage/
        continue-on-error: true
      - name: Comment Coverage on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '## テストカバレッジ\n\n';
            try {
              const summary = JSON.parse(fs.readFileSync('coverage/coverage-summary.json', 'utf8'));
              const total = summary.total;
              body += `| 指標 | カバレッジ |\n|------|----------|\n`;
              body += `| Lines | ${total.lines.pct}% (${total.lines.covered}/${total.lines.total}) |\n`;
              body += `| Functions | ${total.functions.pct}% |\n`;
              body += `| Branches | ${total.branches.pct}% |\n`;
              body += `| Statements | ${total.statements.pct}% |\n`;
              const gate = total.lines.pct >= 80 ? '✅' : '❌';
              body += `\n${gate} ゲート基準: Lines 80% 以上`;
            } catch (e) {
              body += '⚠️ カバレッジデータが取得できませんでした';
            }
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
