name: Weekly Dependency Update Check

on:
  schedule:
    # Run every Monday at 09:00 JST (00:00 UTC)
    - cron: '0 0 * * 1'
  workflow_dispatch:  # Allow manual trigger

# 既定は最小権限（contents:read のみ）。permissions ブロックを省略すると
# GITHUB_TOKEN は issues:write を持たず、脆弱性検知時の issues.create が
# HTTP 403 "Resource not accessible by integration" で失敗し、
# セキュリティ通知が消失する（2026-06-01 の run で実際に発生）。
# issue 起票に必要な権限は update-report ジョブにのみ明示的に付与する。
permissions:
  contents: read

jobs:
  audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run security audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Check outdated packages
        run: npm outdated || true

  update-report:
    name: Generate Update Report
    runs-on: ubuntu-latest
    needs: audit
    if: always()
    # 脆弱性検知時に issue を起票するため issues:write が必須（欠落すると 403）。
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check for security vulnerabilities
        id: audit
        run: |
          npm audit --json > audit-report.json 2>/dev/null || true
          VULN_COUNT=$(cat audit-report.json | python3 -c "import sys, json; d=json.load(sys.stdin); print(d.get('metadata', {}).get('vulnerabilities', {}).get('total', 0))" 2>/dev/null || echo "0")
          echo "vuln_count=$VULN_COUNT" >> "$GITHUB_OUTPUT"

      - name: Create issue if vulnerabilities found
        if: steps.audit.outputs.vuln_count != '0'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const vulnCount = '${{ steps.audit.outputs.vuln_count }}';
            const date = new Date().toISOString().split('T')[0];

            // Check if issue already exists
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['security', 'dependencies'],
              state: 'open',
            });

            if (issues.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `[Security] ${vulnCount} npm vulnerabilities found (${date})`,
                body: `## セキュリティ脆弱性レポート\n\n自動スキャンで **${vulnCount}件** の脆弱性が検出されました。\n\n### 確認方法\n\`\`\`bash\nnpm audit\nnpm audit fix\n\`\`\`\n\n### 対応\n- 高・重大の脆弱性は即時対応\n- 中・低は次回スプリントで対応\n\nGenerated: ${date}`,
                labels: ['security', 'dependencies'],
              });
            }
