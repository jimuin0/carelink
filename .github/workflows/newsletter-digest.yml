name: Newsletter Digest (manual only)

# オーナーニュースレター配信エンドポイント /api/cron/newsletter-digest を叩く workflow。
#
# 【月次自動配信は停止（神原さん確定 2026年7月2日）】: ニュースレターは「お知らせがある時のみ」
# 送る運用に変更したため、定期 schedule を撤去し手動 dispatch 専用にした。日常のお知らせ配信は
# 管理画面 /admin/newsletters（任意の件名・本文を作成 →「今すぐ配信」）で行う。
#
# この workflow は、自動生成の月次サマリー digest を必要な月だけ手動で送りたい場合（または
# 取りこぼし月の再送）に GitHub Actions から手動実行するために残す。エンドポイントは per-email
# 台帳 newsletter_send_log ＋ 決定的 idempotency key で exactly-once（対象月ちょうど1回）を保証
# するため、手動で複数回叩いても二重送信は起きない。

on:
  workflow_dispatch:          # 手動配信・catch-up 専用（月次自動配信は停止）

permissions:
  contents: read

jobs:
  send:
    name: Trigger newsletter-digest (idempotent)
    runs-on: ubuntu-latest
    steps:
      - name: Call newsletter-digest endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          BASE_URL: ${{ secrets.CARELINK_BASE_URL }}
        run: |
          : "${BASE_URL:?CARELINK_BASE_URL secret not set}"
          : "${CRON_SECRET:?CRON_SECRET secret not set}"
          STATUS=$(curl -sS -o /tmp/body -w "%{http_code}" \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$BASE_URL/api/cron/newsletter-digest" \
            --max-time 120)
          echo "Status: $STATUS"
          echo "--- body ---"
          cat /tmp/body
          if [ "$STATUS" -ge 400 ]; then
            exit 1
          fi
