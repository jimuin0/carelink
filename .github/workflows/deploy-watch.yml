name: Deploy Watch

# 過去 38日間デプロイが silently 失敗していた事象の再発防止。
# 2系統で監視:
# 1. deployment_status イベント受信 → 失敗時に自動 Issue 起票
# 2. 30分毎に main HEAD vs Vercel production current SHA 差分検査

on:
  deployment_status:
  schedule:
    - cron: '*/30 * * * *'   # 30分毎の drift 監視
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  deployments: read

jobs:
  notify-deploy-failure:
    name: Notify Deploy Failure
    # Production deployment の失敗のみ Issue 化（Preview 失敗はノイズになるため除外）
    # Preview デプロイは PR 毎に走るため失敗時の自動 Issue は spam 源だった。
    # Preview 失敗は PR の Vercel Bot コメントで開発者が直接確認できる。
    # 注: folded scalar (`>`) は ${{ }} の外に改行を付与し GitHub が文字列扱い→常時 true になる。
    # 単一行の式（${{ }} なし）で記述する。
    if: github.event_name == 'deployment_status' && github.event.deployment_status.state == 'failure' && (github.event.deployment.environment == 'Production' || github.event.deployment.environment == 'production')
    runs-on: ubuntu-latest
    steps:
      - name: Create issue
        uses: actions/github-script@v7
        with:
          script: |
            const ds = context.payload.deployment_status;
            const d = context.payload.deployment;
            const title = `🔴 Production deploy failed (${d.sha.slice(0,7)})`;
            const body = [
              `**Environment:** ${d.environment}`,
              `**Commit:** ${d.sha}`,
              `**State:** ${ds.state}`,
              `**Target URL:** ${ds.target_url || '(none)'}`,
              `**Description:** ${ds.description || '(none)'}`,
              `**Creator:** @${d.creator?.login || 'unknown'}`,
              '',
              '即時対応:',
              '1. Vercel ダッシュボードでビルドログ確認: https://vercel.com/jimuin/carelink/deployments',
              '2. 直前の Production deploy を Promote to Production で即時ロールバック',
              '3. 原因特定して修正 PR → マージ → 再デプロイ',
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title,
              body,
              labels: ['deploy-failure', 'priority:high'],
            });

  notify-deploy-success:
    name: Notify Deploy Success + Startup Check
    # 品質スタック L7-D: 起動時 (= deploy 成功直後) に全依存系の OK/NG を Slack 通知
    # Production deploy 成功時のみ。5分待ってから /api/health を叩いて結果を投稿。
    # folded scalar による常時 true を回避（単一行・${{ }} なし）。
    if: github.event_name == 'deployment_status' && github.event.deployment_status.state == 'success' && (github.event.deployment.environment == 'Production' || github.event.deployment.environment == 'production')
    runs-on: ubuntu-latest
    steps:
      - name: Wait for deployment warm-up (60s)
        run: sleep 60

      - name: Probe /api/health and notify Slack
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_DEFAULT_CHANNEL: ${{ secrets.SLACK_DEFAULT_CHANNEL }}
          DEPLOY_SHA: ${{ github.event.deployment.sha }}
        run: |
          STATUS_CODE=$(curl -s -o /tmp/h.json -w "%{http_code}" --max-time 30 https://carelink-jp.com/api/health || echo "000")
          BODY=$(cat /tmp/h.json 2>/dev/null || echo '{}')
          STATUS=$(echo "$BODY" | python3 -c "import sys,json; print(json.load(sys.stdin).get('status','unknown'))" 2>/dev/null || echo "unknown")
          if [ "$STATUS_CODE" = "200" ] && [ "$STATUS" = "healthy" ]; then
              EMOJI="✅"; LEVEL="STARTUP OK"
          else
              EMOJI="🟡"; LEVEL="STARTUP DEGRADED"
          fi
          export STATUS_CODE STATUS EMOJI LEVEL
          export HEALTH_BODY="$BODY"

          python3 <<'PY'
          import json, os, urllib.request
          token = os.environ['SLACK_BOT_TOKEN']
          channel = os.environ['SLACK_DEFAULT_CHANNEL']
          sha = os.environ['DEPLOY_SHA'][:7]
          emoji = os.environ['EMOJI']
          level = os.environ['LEVEL']
          status_code = os.environ['STATUS_CODE']
          status = os.environ['STATUS']
          body = os.environ.get('HEALTH_BODY', '')[:1500]
          text = (
              f"{emoji} *Production deploy startup check* — {level}\n"
              f"> commit: `{sha}`\n"
              f"> health HTTP: `{status_code}` / status: `{status}`\n"
              f"```{body}```"
          )
          req = urllib.request.Request(
              'https://slack.com/api/chat.postMessage',
              data=json.dumps({'channel': channel, 'text': text}).encode('utf-8'),
              headers={'Authorization': f'Bearer {token}', 'Content-Type': 'application/json; charset=utf-8'},
          )
          try:
              urllib.request.urlopen(req, timeout=10)
              print(f"{emoji} Slack notified")
          except Exception as e:
              print(f"⚠️ Slack post failed: {e}")
          PY

  drift-check:
    name: HEAD vs Production SHA Drift
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - name: Get main HEAD SHA
        id: head
        run: echo "sha=$(git rev-parse origin/main)" >> "$GITHUB_OUTPUT"

      - name: Get latest Production deployment SHA
        id: prod
        run: |
          # GitHub Deployments API（Vercel が production deployment を作成しているはず）
          SHA=$(gh api "repos/${{ github.repository }}/deployments?environment=Production&per_page=1" --jq '.[0].sha // ""')
          CREATED=$(gh api "repos/${{ github.repository }}/deployments?environment=Production&per_page=1" --jq '.[0].created_at // ""')
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "created=$CREATED" >> "$GITHUB_OUTPUT"

      - name: Compare and alert
        run: |
          HEAD="${{ steps.head.outputs.sha }}"
          PROD="${{ steps.prod.outputs.sha }}"
          CREATED="${{ steps.prod.outputs.created }}"

          if [ -z "$PROD" ]; then
            echo "⚠️  Production deployment 未検出（Vercel 連携 or Deployments API 失敗）"
            exit 0
          fi

          if [ "$HEAD" = "$PROD" ]; then
            echo "✅ HEAD = Production SHA ($HEAD)"
            exit 0
          fi

          # 60分以上ドリフトしているかチェック
          AGE_SECONDS=$(( $(date +%s) - $(date -d "$CREATED" +%s) ))
          AGE_MIN=$(( AGE_SECONDS / 60 ))
          AHEAD=$(git rev-list --count "$PROD..$HEAD" 2>/dev/null || echo "?")

          echo "📊 Drift detected:"
          echo "  HEAD:         $HEAD"
          echo "  Production:   $PROD (${AGE_MIN} min ago)"
          echo "  Commits behind: $AHEAD"

          if [ $AGE_MIN -lt 60 ]; then
            echo "  → デプロイ進行中の可能性 (60分未満)、warn のみ"
            exit 0
          fi

          # 60分超のドリフト → Issue 起票
          gh issue list --label "deploy-drift" --state open --json title --jq '.[].title' \
            | grep -q "Deploy drift" && echo "既に open issue あり" && exit 0

          gh issue create \
            --title "🟡 Deploy drift: HEAD と Production が ${AHEAD} commits 乖離 (${AGE_MIN} min)" \
            --label "deploy-drift,priority:medium" \
            --body "$(cat <<EOF
          ## ドリフト検知
          - HEAD: \`$HEAD\`
          - Production: \`$PROD\` (${AGE_MIN} 分前)
          - 未反映: ${AHEAD} commits

          ## 想定原因
          - Vercel-GitHub 連携が切れている（過去事例: GitHub App 未インストール）
          - ビルド失敗が連続している（vercel.json cron 違反等）
          - 手動デプロイのキューが詰まっている

          ## 対応
          1. Vercel ダッシュボードで最新デプロイ状態確認
          2. GitHub Actions の Vercel Preview Build PR check 履歴確認
          3. 必要なら \`vercel --prod\` で手動デプロイ
          EOF
          )"
