name: Scheduled Cron Jobs

# Vercel Hobby プランは cron 頻度を 1日1回に制限しているため
# vercel.json から GitHub Actions に移行（schedule 自由 + 無料）
# 各ジョブは Bearer ${{ secrets.CRON_SECRET }} で /api/cron/* を叩く

# 最小権限: 外部URLへ curl するのみでリポジトリ書き込みは不要。GITHUB_TOKEN を read 限定にする
# （リポジトリ既定が read-and-write でも本 workflow のトークンを過剰権限にしない）。
permissions:
  contents: read

on:
  schedule:
    # UTC 表記。日本時間 = UTC + 9
    - cron: '0 15 * * *'   # booking-reminder       JST 00:00 daily
    - cron: '0 6 * * *'    # daily-summary          JST 15:00 daily
    - cron: '0 7 * * 0'    # customer-segment       JST 16:00 Sunday
    - cron: '0 18 * * *'   # review-request         JST 03:00 daily
    - cron: '0 9 * * 0'    # sync-google-ratings    JST 18:00 Sunday
    - cron: '0 16 * * *'   # onboarding-followup    JST 01:00 daily
    - cron: '0 14 * * *'   # birthday-coupon        JST 23:00 daily
    - cron: '0 * * * *'    # flag-reviews           hourly
    - cron: '0 15 * * 1'   # favorites-digest       JST 00:00 Monday
    - cron: '10 22 * * 0'  # weekly-report          JST 07:10 Monday (minute 10=他cronと衝突回避)
    - cron: '30 * * * *'   # waitlist-notify        hourly (offset to avoid collision)
    - cron: '*/15 * * * *' # webhook-retry          every 15 min
    - cron: '20 17 * * *'  # hpb-menu-scrape        JST 02:20 daily (minute 20=他cronと衝突回避)
    - cron: '40 17 * * *'  # schema-drift-check     JST 02:40 daily (minute 40=他cronと衝突回避)
    # ニュースレターの自動月次配信は廃止（神原さん確定 2026年7月2日「お知らせがある時のみ」）。
    # 配信は管理画面 /admin/newsletters からの手動送信に一本化した。cron ジョブは持たない。
  workflow_dispatch:
    inputs:
      job:
        description: '手動実行する cron path'
        required: true
        type: choice
        options:
          - /api/cron/booking-reminder
          - /api/cron/daily-summary
          - /api/cron/customer-segment
          - /api/cron/review-request
          - /api/cron/sync-google-ratings
          - /api/cron/onboarding-followup
          - /api/cron/birthday-coupon
          - /api/cron/flag-reviews
          - /api/cron/favorites-digest
          - /api/cron/weekly-report
          - /api/cron/waitlist-notify
          - /api/cron/webhook-retry
          - /api/cron/hpb-menu-scrape
          - /api/cron/schema-drift-check

jobs:
  dispatch:
    name: Dispatch matching cron
    runs-on: ubuntu-latest
    steps:
      - name: Resolve target path
        id: target
        env:
          MANUAL_JOB: ${{ inputs.job }}
          TRIGGER_CRON: ${{ github.event.schedule }}
        run: |
          # 手動 dispatch の job 入力を既知パスの allowlist で検証する（C-7 根治）。
          # 従来は無検証でそのまま Bearer CRON_SECRET 付き curl の宛先に使っており、
          # dispatch 権限を持つ Actions アクターが任意の自ドメインパスへ CRON_SECRET 付き
          # リクエストを送れた（本ワークフロー自体は最小権限だが、CRON_SECRET の悪用面を
          # 広げていた）。schedule 経由は case 文で既に既知パスに限定されているため、
          # 手動経路も同じ既知パス集合のみ許可する。
          ALLOWED_JOBS="/api/cron/booking-reminder /api/cron/daily-summary /api/cron/customer-segment /api/cron/review-request /api/cron/sync-google-ratings /api/cron/onboarding-followup /api/cron/birthday-coupon /api/cron/flag-reviews /api/cron/favorites-digest /api/cron/weekly-report /api/cron/waitlist-notify /api/cron/webhook-retry /api/cron/hpb-menu-scrape /api/cron/schema-drift-check"
          if [ -n "$MANUAL_JOB" ]; then
            MATCH=0
            for p in $ALLOWED_JOBS; do
              if [ "$p" = "$MANUAL_JOB" ]; then MATCH=1; fi
            done
            if [ "$MATCH" -eq 1 ]; then
              echo "path=$MANUAL_JOB" >> "$GITHUB_OUTPUT"
              exit 0
            else
              echo "Unknown manual job (not in allowlist): $MANUAL_JOB"
              exit 1
            fi
          fi
          case "$TRIGGER_CRON" in
            "0 15 * * *")    P="/api/cron/booking-reminder" ;;
            "0 6 * * *")     P="/api/cron/daily-summary" ;;
            "0 7 * * 0")     P="/api/cron/customer-segment" ;;
            "0 18 * * *")    P="/api/cron/review-request" ;;
            "0 9 * * 0")     P="/api/cron/sync-google-ratings" ;;
            "0 16 * * *")    P="/api/cron/onboarding-followup" ;;
            "0 14 * * *")    P="/api/cron/birthday-coupon" ;;
            "0 * * * *")     P="/api/cron/flag-reviews" ;;
            "0 15 * * 1")    P="/api/cron/favorites-digest" ;;
            "10 22 * * 0")   P="/api/cron/weekly-report" ;;
            "30 * * * *")    P="/api/cron/waitlist-notify" ;;
            "*/15 * * * *")  P="/api/cron/webhook-retry" ;;
            "20 17 * * *")   P="/api/cron/hpb-menu-scrape" ;;
            "40 17 * * *")   P="/api/cron/schema-drift-check" ;;
            # ニュースレターは自動配信を廃止し手動送信のみ（cron 対象外）。
            *) echo "Unknown schedule: $TRIGGER_CRON"; exit 1 ;;
          esac
          echo "path=$P" >> "$GITHUB_OUTPUT"

      - name: Call cron endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          BASE_URL: ${{ secrets.CARELINK_BASE_URL }}
          TARGET_PATH: ${{ steps.target.outputs.path }}
        run: |
          : "${BASE_URL:?CARELINK_BASE_URL secret not set}"
          : "${CRON_SECRET:?CRON_SECRET secret not set}"
          STATUS=$(curl -sS -o /tmp/body -w "%{http_code}" \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$BASE_URL$TARGET_PATH" \
            --max-time 300)
          echo "Status: $STATUS"
          echo "--- body ---"
          cat /tmp/body
          if [ "$STATUS" -ge 400 ]; then
            exit 1
          fi
