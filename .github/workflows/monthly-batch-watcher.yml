name: Monthly Batch Watcher

# 品質スタック L7-C: 月次バッチが所定時刻を過ぎても未発火なら Slack 通知。
# CareLink の月次 cron は newsletter-digest（毎月 1日 16:00 UTC = JST 01:00 翌日）。
#
# 仕組み:
#   - 毎月 2日 03:00 UTC（JST 12:00）に発火
#   - Supabase cron_logs を service_role 経由で参照
#   - 前日（1日）以降の newsletter-digest 成功記録が無ければ Slack 通知

on:
  schedule:
    - cron: '0 3 2 * *'   # 毎月 2 日 03:00 UTC
  workflow_dispatch:

permissions:
  contents: read

env:
  HEALTH_URL: https://carelink-jp.com/api/health

jobs:
  check-monthly-batch:
    name: Verify monthly newsletter-digest fired
    runs-on: ubuntu-latest
    steps:
      - name: Fetch latest cron log via Supabase REST
        id: fetch
        env:
          SUPABASE_URL: https://xzafxiupbflvgbarrihe.supabase.co
          SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          # 当月 1 日 00:00 UTC 以降の newsletter-digest success ログを取得。
          # newsletter-digest は毎月 1 日 16:00 UTC 発火・本 watcher は 2 日に検証する設計。
          # 旧実装は SINCE="昨日 00:00" だったため、本 watcher が 2 日以外（手動 dispatch /
          # 再実行 / スケジュールずれ）に走ると窓が 1 日発火より後ろにずれ、実際は発火済みでも
          # 「未発火」と誤検知した（監視の偽陽性＝狼少年化で監視不信を招く盲点）。
          # SINCE を「当月初日 00:00 UTC」に固定し、実行日に依存せず当月の発火有無を判定する
          # （発症前予防・恒久対策）。当月初日は GNU/BSD date 共通で literal "-01" で表現できる。
          # 重要: HTTP status を検証せず本文を len() すると、401/500 等のエラー本文
          # （JSON オブジェクト）のキー数を「発火回数」と誤カウントし、監視が認証/接続
          # エラーに盲目（恒常的な偽陽性）になる。status を ok / error に分け、error は
          # 別途警報する（発火の有無を確認できないことを隠さない＝発症前予防）。
          SINCE=$(date -u +"%Y-%m-01T00:00:00Z")
          echo "since=$SINCE" >> "$GITHUB_OUTPUT"
          echo "since=$SINCE"

          # secret に混入した改行(CR/LF)を除去する。改行付きの値を curl の
          # -H ヘッダに渡すと curl が exit 43 (CURLE_BAD_FUNCTION_ARGUMENT) で落ち、
          # 監視ジョブ自体が起動不能になる（発火有無を確認できない盲点）。
          # service_role JWT は base64url で改行・空白を含まないため除去は安全。
          # 発症前予防: secret 側に改行が紛れても監視が機能し続けるようにする。
          SERVICE_ROLE_KEY=$(printf '%s' "$SERVICE_ROLE_KEY" | tr -d '\r\n')

          if [ -z "$SERVICE_ROLE_KEY" ]; then
            echo "http=000 (SUPABASE_SERVICE_ROLE_KEY 未設定)"
            echo "status=error" >> "$GITHUB_OUTPUT"
            echo "detail=SUPABASE_SERVICE_ROLE_KEY 未設定のため cron_logs を照会できません" >> "$GITHUB_OUTPUT"
            echo "🔴 SUPABASE_SERVICE_ROLE_KEY 未設定 — 発火有無を確認できません"
            exit 0
          fi

          RESP=$(curl -s -w "\n%{http_code}" --max-time 30 \
            -H "apikey: $SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SERVICE_ROLE_KEY" \
            "$SUPABASE_URL/rest/v1/cron_logs?job_name=eq.newsletter-digest&status=eq.success&started_at=gte.$SINCE&select=id,started_at&order=started_at.desc&limit=1")
          BODY=$(echo "$RESP" | head -n -1)
          CODE=$(echo "$RESP" | tail -n 1)
          echo "http=$CODE"

          if [ "$CODE" != "200" ]; then
            echo "status=error" >> "$GITHUB_OUTPUT"
            echo "detail=cron_logs 照会が HTTP $CODE で失敗（認証/接続エラー）" >> "$GITHUB_OUTPUT"
            echo "🔴 cron_logs 照会失敗 (HTTP $CODE) — 発火有無を確認できません"
            exit 0
          fi

          # 200 のときのみ件数を数える。配列でなければ 0 とみなす（防御）。
          COUNT=$(echo "$BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(len(d) if isinstance(d, list) else 0)" 2>/dev/null || echo 0)
          echo "status=ok" >> "$GITHUB_OUTPUT"
          echo "fired_count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "📊 newsletter-digest fired since $SINCE (当月分): $COUNT"

      - name: Alert if not fired
        if: steps.fetch.outputs.status == 'ok' && steps.fetch.outputs.fired_count == '0'
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_DEFAULT_CHANNEL: ${{ secrets.SLACK_DEFAULT_CHANNEL }}
          SINCE: ${{ steps.fetch.outputs.since }}
        run: |
          python3 <<PY
          import json, os, urllib.request
          token = os.environ['SLACK_BOT_TOKEN']
          channel = os.environ['SLACK_DEFAULT_CHANNEL']
          since = os.environ['SINCE']
          text = (
              "🟡 *Monthly batch alert: newsletter-digest 未発火*\n"
              f"> 期間: {since} 以降\n"
              f"> 期待: 毎月 1日 16:00 UTC に発火 → cron_logs に成功記録\n"
              "> 確認: GitHub Actions の cron.yml ログ + Supabase cron_logs テーブル\n"
              "> 原因候補: GitHub Actions 障害 / Supabase 接続不能 / Resend 障害"
          )
          req = urllib.request.Request(
              'https://slack.com/api/chat.postMessage',
              data=json.dumps({'channel': channel, 'text': text}).encode('utf-8'),
              headers={'Authorization': f'Bearer {token}', 'Content-Type': 'application/json; charset=utf-8'},
          )
          try:
              urllib.request.urlopen(req, timeout=10)
              print("🟡 Slack alerted: newsletter-digest 未発火")
          except Exception as e:
              print(f"⚠️ Slack post failed: {e}")
          PY

      - name: Alert if check failed
        # cron_logs を照会できなかった（secret 未設定 / 認証 / 接続エラー）場合は、
        # 「発火有無を確認できない」ことを隠さず警報する（偽陽性の防止＝発症前予防）。
        if: steps.fetch.outputs.status == 'error'
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_DEFAULT_CHANNEL: ${{ secrets.SLACK_DEFAULT_CHANNEL }}
          DETAIL: ${{ steps.fetch.outputs.detail }}
        run: |
          python3 <<PY
          import json, os, urllib.request
          token = os.environ['SLACK_BOT_TOKEN']
          channel = os.environ['SLACK_DEFAULT_CHANNEL']
          detail = os.environ.get('DETAIL', '(詳細なし)')
          text = (
              "🔴 *Monthly batch watcher: 監視自体が失敗*\n"
              f"> 詳細: {detail}\n"
              "> 影響: newsletter-digest の発火有無を確認できていません（監視の盲点）\n"
              "> 対応: GitHub Secrets に SUPABASE_SERVICE_ROLE_KEY を設定 / Supabase 接続を確認"
          )
          req = urllib.request.Request(
              'https://slack.com/api/chat.postMessage',
              data=json.dumps({'channel': channel, 'text': text}).encode('utf-8'),
              headers={'Authorization': f'Bearer {token}', 'Content-Type': 'application/json; charset=utf-8'},
          )
          try:
              urllib.request.urlopen(req, timeout=10)
              print("🔴 Slack alerted: 監視自体が失敗")
          except Exception as e:
              print(f"⚠️ Slack post failed: {e}")
          PY
          # 監視が機能していないことを CI 上でも可視化するため失敗させる。
          exit 1

      - name: OK
        if: steps.fetch.outputs.status == 'ok' && steps.fetch.outputs.fired_count != '0'
        run: echo "✅ newsletter-digest 発火確認済 (last 24h)"
