<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>オフライン | CareLink</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,sans-serif;background:#f8fafc;color:#334155;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1rem}
.container{text-align:center;max-width:400px}
.icon{width:80px;height:80px;margin:0 auto 1.5rem;background:#0ea5e9;border-radius:20px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:40px;font-weight:900}
h1{font-size:1.25rem;margin-bottom:.5rem;color:#0f172a}
p{color:#64748b;line-height:1.6;margin-bottom:1.5rem}
button{background:#0284c7;color:#fff;border:none;padding:.75rem 2rem;border-radius:8px;font-size:1rem;cursor:pointer;transition:background .2s}
button:hover{background:#0369a1}
</style>
</head>
<body>
<div class="container">
<div class="icon">C</div>
<h1>インターネットに接続されていません</h1>
<p>ネットワーク接続を確認して、もう一度お試しください。</p>
<button onclick="location.reload()">再読み込み</button>
</div>
</body>
</html>
