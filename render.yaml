# Render Blueprint: CareLink cron jobs（機能ごとに独立した Render Cron Job）
#
# 目的: GitHub Actions の scheduled workflow は public repo では GitHub が有料/private を優先して
# 大幅に間引く（実測で cron.yml 最大176分・health-monitor 最大283分の空白が平常運転で頻発）。
# Render Cron Jobs は cron 式通り定刻発火する（神原の cancel-fee-cron が毎時00分ちょうどに
# 正確発火しているログで実証済み・間引きゼロ）。各ジョブを独立サービスにすることで、
# 1個の障害が他に波及せず（単一障害点なし）、Render ダッシュボードで各ジョブの実行履歴・
# 成否・ログが個別に可視化される（神原の imakra-cron-health 等と同じ運用）。
#
# GitHub Actions cron.yml/health-monitor.yml は本 PR では残し二重化（endpoint は冪等で
# 二重発火は無害）。Render 稼働確認後の別 PR で GitHub 側を廃止する。
#
# スケジュールの SSOT は src/lib/cron-jobs.data.json。本ファイルの各 schedule / job 名が
# それと一致することを src/__tests__/render-yaml-drift.test.ts が CI で検証する。
#
# 【神原のデプロイ手順】
#   1. Render Dashboard → New → Blueprint → この GitHub repo を選択
#   2. carelink-* の cron サービス群 + carelink-health-check が作成される
#   3. Environment Group「carelink-cron-env」に設定（sync:false のため git には保存されない）:
#      - CARELINK_BASE_URL     = https://carelink-jp.com
#      - CRON_SECRET           = Vercel の CRON_SECRET と同値
#      - SLACK_BOT_TOKEN       = Vercel と同じ xoxb- トークン（監視通報用）
#      - SLACK_DEFAULT_CHANNEL = Vercel と同じ C0... チャンネル
#   4. Deploy → 各 cron が schedule 通りに /api/cron/* を叩き、Render UI で成否を確認

envVarGroups:
  - name: carelink-cron-env
    envVars:
      - key: CARELINK_BASE_URL
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: SLACK_DEFAULT_CHANNEL
        sync: false

services:
  # --- 機能 cron（15 ジョブ・SSOT cron-jobs.data.json と 1:1）---
  - type: cron
    name: carelink-booking-reminder
    runtime: node
    schedule: "0 15 * * *"
    buildCommand: echo "no build (Node 標準のみ)"
    startCommand: node scripts/cron-call.mjs booking-reminder
    envVars:
      - fromGroup: carelink-cron-env

  - type: cron
    name: carelink-daily-summary
    runtime: node
    schedule: "0 6 * * *"
